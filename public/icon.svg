<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="#06091A"/>
  <!-- Gold gradient background circle -->
  <circle cx="16" cy="16" r="13" fill="url(#goldGrad)" opacity="0.15"/>
  <!-- Aza symbol ⵣ stylized as paths -->
  <!-- Top horizontal bar -->
  <rect x="8" y="9" width="16" height="2" rx="1" fill="url(#goldGrad)"/>
  <!-- Middle horizontal bar -->
  <rect x="8" y="15" width="16" height="2" rx="1" fill="url(#goldGrad)"/>
  <!-- Bottom horizontal bar -->
  <rect x="8" y="21" width="16" height="2" rx="1" fill="url(#goldGrad)"/>
  <!-- Center dot accent -->
  <circle cx="16" cy="16" r="1.5" fill="#FFB300"/>
  <defs>
    <linearGradient id="goldGrad" x1="8" y1="9" x2="24" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
</svg>
